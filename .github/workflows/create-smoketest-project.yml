name: 🧪 Opprett smoke test-prosjekt

# Creates a GitHub Project for smoke testing a release:
#   1. One issue per package from the YAML issue templates
#   2. A summary issue that links all package issues
#   3. A GitHub Projects (v2) board containing all the above issues
#
# Required token scopes for full functionality:
#   • issues:write         – create issues (included in GH_TOKEN)
#   • projects:write       – create/manage org-level Projects v2
#
# If project creation fails (e.g. GH_TOKEN lacks the "project" OAuth
# scope), all issues are still created and the run reports partial success.
# In that case, set GH_PROJECT_TOKEN to a PAT with the "project" scope and
# re-run the workflow.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versjon som skal smoke testes (f.eks. 1.13.0)"
        required: true
        type: string
      environment:
        description: "Testmiljø"
        required: true
        type: choice
        default: "Ny installasjon"
        options:
          - "Ny installasjon"
          - "Oppgradering"
          - "Begge"

permissions:
  contents: read
  issues: write

jobs:
  create_smoketest_project:
    name: Opprett smoke test GitHub-prosjekt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Parse YAML templates → JSON ──────────────────────────────────────
      - name: Parse smoke test templates
        env:
          VERSION: ${{ inputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          pip install "pyyaml==6.0.2" --quiet
          python3 .github/scripts/parse_smoketest_templates.py > /tmp/smoke_test_issues.json
          COUNT=$(jq '. | length' /tmp/smoke_test_issues.json)
          echo "Parsed ${COUNT} templates"

      # ── Create issues + GitHub Project ───────────────────────────────────
      - name: Create issues and GitHub Project
        id: create_project
        uses: actions/github-script@v7
        env:
          VERSION: ${{ inputs.version }}
          ENVIRONMENT: ${{ inputs.environment }}
          # Optional: set GH_PROJECT_TOKEN to a PAT with "project" scope for
          # organisation-level project creation.
          GH_PROJECT_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
        with:
          # Prefer GH_PROJECT_TOKEN (needs "project" scope) so that
          # org-level project creation works; fall back to GH_TOKEN.
          github-token: ${{ secrets.GH_PROJECT_TOKEN || secrets.GH_TOKEN }}
          script: |
            const fs    = require("fs");
            const version     = process.env.VERSION;
            const environment = process.env.ENVIRONMENT;
            const owner       = context.repo.owner;
            const repo        = context.repo.repo;

            // ── 1. Read parsed templates ────────────────────────────────
            const issueTemplates = JSON.parse(
              fs.readFileSync("/tmp/smoke_test_issues.json", "utf8")
            );

            // ── 2. Ensure smoke-test label exists ──────────────────────
            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (getErr) {
                if (getErr.status !== 404) {
                  console.warn(`⚠️  Could not fetch label "${name}": ${getErr.message}`);
                  return;
                }
                try {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                } catch (createErr) {
                  // 422 = label already exists (race condition) — safe to ignore
                  if (createErr.status !== 422) {
                    console.warn(`⚠️  Could not create label "${name}": ${createErr.message}`);
                  }
                }
              }
            }

            await ensureLabel("smoke-test", "e4e669", "Smoke test issue");

            // ── 3. Create one issue per package ────────────────────────
            const createdIssues = [];
            for (const tmpl of issueTemplates) {
              const { data: issue } = await github.rest.issues.create({
                owner,
                repo,
                title:  tmpl.title,
                body:   tmpl.body,
                labels: tmpl.labels,
              });
              createdIssues.push({ ...issue, package: tmpl.package });
              console.log(`✅ Opprettet issue #${issue.number}: ${tmpl.title}`);
            }

            // ── 4. Build and create summary issue ──────────────────────
            const today = new Date().toISOString().slice(0, 10);

            const packageChecklist = createdIssues
              .map(i => `- [ ] ${i.package} — #${i.number}`)
              .join("\n");

            const testerTable = createdIssues
              .map(i => `| ${i.package} | @github-brukernavn |`)
              .join("\n");

            const statusTable = createdIssues
              .map(i => `| ${i.package} | ⏳ Ikke startet | |`)
              .join("\n");

            const summaryBody = [
              `# 🧪 Smoke test for v${version}`,
              ``,
              `## Testinformasjon`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Versjon** | ${version} |`,
              `| **Miljø** | ${environment} |`,
              `| **Dato** | ${today} |`,
              ``,
              `## 📦 Per-pakke smoke test issues`,
              ``,
              `Følgende issues ble automatisk opprettet for hver pakke:`,
              ``,
              packageChecklist,
              ``,
              `## 👥 Tester-tilordning`,
              ``,
              `| Pakke | Tester |`,
              `|-------|--------|`,
              testerTable,
              ``,
              `## ✅ Oppsummert status`,
              ``,
              `Oppdater status for hver pakke etter hvert som testing er ferdig:`,
              ``,
              `| Pakke | Status | Merknader |`,
              `|-------|--------|-----------|`,
              statusTable,
              ``,
              `**Statusikoner:** ⏳ Ikke startet | 🔄 Pågår | ✅ Bestått | ❌ Feil funnet | 🚫 Blokkert`,
            ].join("\n");

            const { data: summaryIssue } = await github.rest.issues.create({
              owner,
              repo,
              title:  `🧪 Smoke test: Oppsummering — v${version}`,
              body:   summaryBody,
              labels: ["smoke-test"],
            });
            console.log(`✅ Opprettet oppsummerings-issue #${summaryIssue.number}`);

            // ── 5. Resolve owner node ID (needed for Projects v2) ──────
            const ownerQuery = await github.graphql(`
              query($login: String!) {
                repositoryOwner(login: $login) {
                  id
                  __typename
                }
              }
            `, { login: owner });

            const ownerId   = ownerQuery.repositoryOwner.id;
            const ownerType = ownerQuery.repositoryOwner.__typename; // "Organization" | "User"

            // ── 6. Create GitHub Projects v2 board ────────────────────
            const projectTitle = `🧪 Smoke test v${version}`;
            let projectId, projectNumber, projectUrl;

            try {
              const projectResult = await github.graphql(`
                mutation($ownerId: ID!, $title: String!) {
                  createProjectV2(input: { ownerId: $ownerId, title: $title }) {
                    projectV2 {
                      id
                      number
                      url
                    }
                  }
                }
              `, { ownerId, title: projectTitle });

              projectId     = projectResult.createProjectV2.projectV2.id;
              projectNumber = projectResult.createProjectV2.projectV2.number;
              projectUrl    = projectResult.createProjectV2.projectV2.url;
              console.log(`✅ Opprettet GitHub-prosjekt: ${projectUrl}`);
            } catch (err) {
              console.error(`⚠️  Kunne ikke opprette GitHub-prosjekt: ${err.message}`);
              console.log("ℹ️  Issues ble opprettet, men prosjektet må opprettes manuelt.");
              console.log("ℹ️  Sett GH_PROJECT_TOKEN til en PAT med 'project'-scope og kjør workflowen på nytt.");

              core.setOutput("summary-issue-number", String(summaryIssue.number));
              core.setOutput("summary-issue-url",    summaryIssue.html_url);
              core.setOutput("project-created",      "false");
              return;
            }

            // ── 7. Add all issues to the project ──────────────────────
            const allIssues = [...createdIssues, summaryIssue];
            for (const issue of allIssues) {
              try {
                await github.graphql(`
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: {
                      projectId: $projectId,
                      contentId: $contentId
                    }) {
                      item { id }
                    }
                  }
                `, { projectId, contentId: issue.node_id });
                console.log(`  ➕ La til #${issue.number} i prosjektet`);
              } catch (err) {
                console.error(`  ⚠️  Kunne ikke legge til #${issue.number}: ${err.message}`);
              }
            }

            // ── 8. Set outputs ─────────────────────────────────────────
            core.setOutput("project-number",       String(projectNumber));
            core.setOutput("project-url",          projectUrl);
            core.setOutput("summary-issue-number", String(summaryIssue.number));
            core.setOutput("summary-issue-url",    summaryIssue.html_url);
            core.setOutput("project-created",      "true");

            console.log(`\n🎉 Ferdig!`);
            console.log(`📋 Prosjekt:             ${projectUrl}`);
            console.log(`📌 Oppsummerings-issue:  ${summaryIssue.html_url}`);

      # ── Job summary ──────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          VERSION:              ${{ inputs.version }}
          ENVIRONMENT:          ${{ inputs.environment }}
          PROJECT_CREATED:      ${{ steps.create_project.outputs.project-created }}
          PROJECT_URL:          ${{ steps.create_project.outputs.project-url }}
          SUMMARY_ISSUE_NUMBER: ${{ steps.create_project.outputs.summary-issue-number }}
          SUMMARY_ISSUE_URL:    ${{ steps.create_project.outputs.summary-issue-url }}
        run: |
          {
            echo "## 🧪 Smoke test opprettet — v${VERSION}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Versjon** | \`${VERSION}\` |"
            echo "| **Miljø** | ${ENVIRONMENT} |"
            if [ "${PROJECT_CREATED}" = "true" ]; then
              echo "| **GitHub-prosjekt** | [${PROJECT_URL}](${PROJECT_URL}) |"
            fi
            if [ -n "${SUMMARY_ISSUE_NUMBER}" ]; then
              echo "| **Oppsummerings-issue** | [#${SUMMARY_ISSUE_NUMBER}](${SUMMARY_ISSUE_URL}) |"
            fi
            if [ "${PROJECT_CREATED}" != "true" ]; then
              echo ""
              echo "> [!WARNING]"
              echo "> GitHub-prosjektet ble **ikke** opprettet automatisk."
              echo "> Sett **\`GH_PROJECT_TOKEN\`** til en PAT med \`project\`-scope og kjør workflowen på nytt,"
              echo "> eller opprett prosjektet manuelt og legg til de opprettede issues."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
