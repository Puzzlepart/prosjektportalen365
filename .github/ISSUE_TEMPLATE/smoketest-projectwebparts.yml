        - label: "Nedtrekk «Mal» viser tilgjengelige maler — feilmelding «En mal må velges for å opprette en nyhetsartikkel»"
        - label: "Knappen «Forhåndsvis valgt mal» åpner forhåndsvisningspanel (iframe) på høyre side"
        - label: "Under opprettelse vises spinner «Oppretter nyhetsartikkel...»"
        - label: "Suksessmelding: «Nyhetsartikkelen ble opprettet» med sjekkmerke-ikon"
        - label: "Feilmelding ved duplikat: «En nyhetsartikkel med samme navn finnes allerede. Vennligst velg et annet navn»"

  - type: checkboxes
    id: news-innstillinger
    attributes:
      label: Prosjektnyheter — Webdelinnstillinger
      description: >
        Property pane-innstillinger for nyhetswebdelen.
      options:
        - label: "«Antall synlige nyheter» (før «Vis mer»-knapp) kan justeres"
        - label: "«Mappenavn» for nyhetslagring kan endres (standard: «Prosjektnyheter»)"
        - label: "«URL til området» vises i egenskaper"

