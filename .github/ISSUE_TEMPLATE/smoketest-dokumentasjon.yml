name: "🧪 Smoke test: Dokumentasjon og hjelpeinnhold"
description: Smoke test for dokumentasjon, hjelpeinnhold og annet
labels: ["smoke-test", "Dokumentasjon"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📔 Smoke test — Dokumentasjon og hjelpeinnhold

        Gå gjennom dokumentasjon og hjelpeinnhold for å verifisere rettskrivning, oppdatert innhold og bilder.
        Kryss av for hvert testpunkt som er bestått. Ved feil: legg igjen en kommentar med beskrivelse og skjermbilder.

  - type: input
    id: versjon
    attributes:
      label: Versjon
      description: Hvilken versjon testes?
      placeholder: "1.13.0"
    validations:
      required: true

  - type: input
    id: tester
    attributes:
      label: Tester
      description: Hvem utfører testen?
      placeholder: Navn eller GitHub brukernavn
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 📖 GitHub-dokumentasjon

  - type: checkboxes
    id: dokumentasjon
    attributes:
      label: Dokumentasjon
      description: Verifiser at dokumentasjonen er oppdatert for gjeldende versjon
      options:
        - label: "GitHub brukerdokumentasjon samsvarer med gjeldende versjon"
        - label: "GitHub utviklerdokumentasjon samsvarer med gjeldende versjon"
        - label: "README.md er oppdatert med korrekt versjonsnummer og instruksjoner"
        - label: "CHANGELOG.md inneholder oppdaterte endringsnotater"
        - label: "Releasenotes er opprettet for gjeldende versjon"

  - type: markdown
    attributes:
      value: |
        ---
        ## ❓ Hjelpeinnhold på sider

  - type: checkboxes
    id: hjelpeinnhold
    attributes:
      label: Hjelpeinnhold
      description: Verifiser hjelpeinnhold på tvers av løsningen
      options:
        - label: "Hjelpeinnhold vises på sidene hvor det er lagt opp til"
        - label: "Innholdet er likt med Prosjektportalen brukermanual"
        - label: "Bilder dukker opp korrekt i hjelpeinnholdet"
        - label: "Lenker i hjelpeinnholdet fungerer"
        - label: "Rettskrivning er kontrollert"

  - type: markdown
    attributes:
      value: |
        ---
        ## 🔍 Installasjon og oppgradering

  - type: checkboxes
    id: installasjon
    attributes:
      label: Installasjon og oppgradering
      description: Verifiser at installasjon og oppgraderingsprosessen fungerer
      options:
        - label: "Installasjonsskript kjører uten feil"
        - label: "Alle SharePoint-lister og innholdstyper opprettes korrekt"
        - label: "Navigasjon og sider opprettes korrekt"
        - label: "Oppgraderingsskript kjører uten feil (ved oppgradering)"

  - type: textarea
    id: kommentarer
    attributes:
      label: Kommentarer og feil
      description: Beskriv eventuelle feil eller avvik du finner. Legg ved skjermbilder.
    validations:
      required: false
