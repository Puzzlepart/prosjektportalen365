name: "🧪 Smoke test: PortfolioExtensions"
description: Smoke test for PortfolioExtensions-pakken (footer, idémodul)
labels: ["smoke-test", "PortfolioExtensions"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📦 Smoke test — PortfolioExtensions

        Denne testen dekker **FooterApplicationCustomizer** (footer med alle underkomponenter)
        og **Idémodul-kommandoene** (registrering, behandling, prosjektdata).

        Gå gjennom hvert testpunkt og kryss av når det er bestått.
        Ved feil: legg igjen en kommentar med beskrivelse og skjermbilder.

  - type: input
    id: versjon
    attributes:
      label: Versjon
      description: Hvilken versjon testes?
      placeholder: "1.13.0"
    validations:
      required: true

  - type: dropdown
    id: miljø
    attributes:
      label: Miljø
      description: Er dette en ny installasjon eller en oppgradering?
      options:
        - Ny installasjon (fresh)
        - Oppgradering (upgrade)
    validations:
      required: true

  - type: input
    id: tester
    attributes:
      label: Tester
      description: Hvem utfører testen?
      placeholder: Navn eller GitHub brukernavn
    validations:
      required: true

  - type: dropdown
    id: nettleser
    attributes:
      label: Nettleser
      options:
        - Microsoft Edge
        - Chrome
        - Firefox
        - Safari
    validations:
      required: true

  - type: input
    id: tenant-url
    attributes:
      label: Tenant URL
      description: URL til porteføljeområdet som testes
      placeholder: "https://contoso.sharepoint.com/sites/pp365"
    validations:
      required: true

  # ─────────────────────────────────────────────
  # Footer — Synlighet og Områdeinnstillinger
  # ─────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 🦶 Footer — Synlighet og Områdeinnstillinger

  - type: checkboxes
    id: footer-synlighet
    attributes:
      label: Footer — Synlighet
      description: >
        Footeren styres av globale innstillinger (ShowFooter, MinimizeFooter).
        Testes på porteføljeområdet (hub-site).
      options:
        - label: "Footeren vises når ShowFooter er aktivert i globale innstillinger"
        - label: "Footeren er SKJULT når ShowFooter er deaktivert"
        - label: "Footeren vises i minimert modus når MinimizeFooter er aktivert"

  - type: checkboxes
    id: footer-omradeinnstillinger
    attributes:
      label: "Områdeinnstillinger (SiteSettings)"
      description: >
        Knappen «Områdeinnstillinger» vises KUN for administratorer og KUN på hub-sitet
        (porteføljeområdet). Den er skjult på underområder.
      options:
        - label: "«Områdeinnstillinger»-knappen vises for admin på hub-sitet"
        - label: "«Områdeinnstillinger»-knappen er SKJULT for ikke-admin brukere"
        - label: "«Områdeinnstillinger»-knappen er SKJULT på underområder (ikke hub-site)"
        - label: "Primærknapp fører til /_layouts/15/settings.aspx"
        - label: "Menyvalget «Områdeinnhold» fører til /_layouts/15/viewlsts.aspx"

  # ─────────────────────────────────────────────
  # Footer — Konfigurasjon
  # ─────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## ⚙️ Footer — Konfigurasjon av Prosjektportalen

  - type: checkboxes
    id: footer-konfigurasjon
    attributes:
      label: Konfigurasjon av Prosjektportalen
      description: >
        Knappen «Konfigurasjon av Prosjektportalen» vises KUN for administratorer.
        Den navigerer til konfigurasjonssiden (.../SitePages/<Configuration_PageName>).
      options:
        - label: "«Konfigurasjon av Prosjektportalen»-knappen vises for admin"
        - label: "Knappen er SKJULT for ikke-admin brukere"
        - label: "Klikk fører til riktig konfigurasjonsside på porteføljeområdet"

  # ─────────────────────────────────────────────
  # Footer — Nyttige lenker (PromotedLinks)
  # ─────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 🔗 Footer — Nyttige lenker

  - type: checkboxes
    id: footer-lenker
    attributes:
      label: "Nyttige lenker (PromotedLinks)"
      description: >
        Viser lenker fra «Lenker»-listen. Lenker med nivå «Administrator»
        vises kun for admin-brukere.
      options:
        - label: "Menyen «Nyttige lenker» viser lenker fra Lenker-listen"
        - label: "Lenker med nivå «Administrator» er SKJULT for ikke-admin brukere"
        - label: "Tooltip-lenke til Lenker-listen fungerer (navigerer til listevisning)"
        - label: "Alle lenke-URL-er åpner riktig mål"

  # ─────────────────────────────────────────────
  # Footer — Favorittprosjekter
  # ─────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## ⭐ Footer — Mine favorittprosjekter

  - type: checkboxes
    id: footer-favoritter
    attributes:
      label: "Mine favorittprosjekter (FavoriteProjects)"
      description: >
        Viser prosjekter du følger i gjeldende portefølje via Social Following API.
        Popover med lenker til hvert prosjektområde.
      options:
        - label: "«Mine favorittprosjekter»-knappen vises i footeren"
        - label: "Popover viser fulgte prosjekter som klikkbare lenker"
        - label: "Klikk på prosjektlenke navigerer til riktig prosjektområde"
        - label: "Melding vises når ingen prosjekter er fulgt (tom liste)"

  # ─────────────────────────────────────────────
  # Footer — Assistent
  # ─────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 🤖 Footer — Assistent

  - type: checkboxes
    id: footer-assistent
    attributes:
      label: "Assistent (AI)"
      description: >
        Krever at UseAssistant er aktivert og EndpointUrl er satt i globale innstillinger.
        Tilgang styres av RequireAssistantAccess og medlemskap i gruppen «Assistentbrukere».
      options:
        - label: "«Assistent»-knapp vises når UseAssistant er aktivert OG bruker har tilgang"
        - label: "«Assistent»-knappen er SKJULT når UseAssistant er deaktivert"
        - label: "«Assistent»-knappen er SKJULT når bruker IKKE er i «Assistentbrukere»-gruppen (med RequireAssistantAccess aktivert)"
        - label: "Klikk åpner OverlayDrawer med iframe som peker til riktig EndpointUrl"
        - label: "Innstillinger-knapp i drawer er synlig KUN for admin og åpner Globale innstillinger-listen"
        - label: "Spinner vises mens iframe laster"

  # ─────────────────────────────────────────────
  # Footer — Hjelpeinnhold
  # ─────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## ❓ Footer — Hjelpeinnhold

  - type: checkboxes
    id: footer-hjelp
    attributes:
      label: "Hjelpeinnhold (HelpContent)"
      description: >
        Hjelp-knappen matcher innhold fra Hjelpeinnhold-listen basert på URL-mønster.
        Viser «Hjelp tilgjengelig» / «Hjelp utilgjengelig» avhengig av om det finnes treff.
      options:
        - label: "Hjelp-knappen viser «Hjelp tilgjengelig» på sider med matchende hjelpeinnhold"
        - label: "Hjelp-knappen viser «Hjelp utilgjengelig» (disabled) på sider uten hjelpeinnhold"
        - label: "Hjelp-dialog åpnes med riktig innhold for gjeldende side"
        - label: "Sider med flere hjelpeartikler viser faner (TabList) som kan navigeres mellom"
        - label: "Markdown-innhold rendres korrekt (inkl. bilder og formatering)"
        - label: "Ressurslenke (primærknapp) vises og fungerer når den er definert i hjelpeinnholdet"
        - label: "Hjelpeinnhold oppdateres ved navigering til en ny side (navigatedEvent)"

  # ─────────────────────────────────────────────
  # Footer — Installert versjon
  # ─────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 📋 Footer — Installert versjon

  - type: checkboxes
    id: footer-versjon
    attributes:
      label: "Installert versjon (InstallVersion)"
      description: >
        Viser installert versjon av Prosjektportalen med kanal og dato.
        Sammenligner mot siste release fra GitHub.
      options:
        - label: "Versjonsknapp i footer viser installert versjon (f.eks. «v1.13.0 (main)»)"
        - label: "Popover viser installasjonsdato, fullversjon og installasjonskanal"
        - label: "Lenke «Se alle installasjoner» åpner Installasjonslogg-listen"
        - label: "Siste GitHub release vises med versjon og release-notes"
        - label: "Grønt ikon (ArrowCircleUpSparkle) vises når nyere versjon er tilgjengelig"
        - label: "Svart ikon (CheckmarkCircle) vises når installert versjon er lik siste release"
        - label: "Nedlastingsknapp for siste release vises når nyere versjon er tilgjengelig"

  # ─────────────────────────────────────────────
  # Idéregistrering (ListViewCommandSet)
  # ─────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 💡 Idéregistrering

        Kommandoer på **Idéregistrering**-listen (lister med «registrering» i tittelen).
        Krever medlemskap i **Idébehandlere**-gruppen.

  - type: checkboxes
    id: ideregistrering
    attributes:
      label: Idéregistrering
      description: >
        Test «Sett anbefaling»-kommandoen og «Gå til behandling»-lenken
        på Idéregistrering-listen.
      options:
        - label: "«Sett anbefaling»-knapp vises ved markering av ett listeelement"
        - label: "«Gå til behandling»-knapp vises ved markering av ett listeelement"
        - label: "Begge knapper er SKJULT for brukere som IKKE er i Idébehandlere-gruppen"
        - label: "Begge knapper er SKJULT når ingen elementer er markert"
        - label: "«Gå til behandling» åpner Idébehandling-listen i ny fane"
        - label: "Dialog åpnes med handlingsvalg (Combobox) og kommentarfelt (Textarea)"
        - label: "Innsending er DEAKTIVERT til både valg og kommentar er fylt ut"
        - label: "Godkjenning: anbefaling og kommentar lagres på registreringselementet (GtIdeaRecommendation)"
        - label: "Godkjenning: nytt element opprettes i Idébehandling-listen med kopierte feltverdier"
        - label: "Godkjenning: Idémodul-side URL (Idemodul.aspx#ideaId=...) lenkes fra behandlingselementet"
        - label: "Avvisning: anbefaling og kommentar lagres korrekt"
        - label: "Til vurdering: anbefaling og kommentar lagres korrekt"
        - label: "Allerede anbefalt idé viser varselmelding «Denne ideen er allerede godkjent»"

  # ─────────────────────────────────────────────
  # Idébehandling (ListViewCommandSet)
  # ─────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 🔄 Idébehandling

        Kommando på **Idébehandling**-listen.
        Krever medlemskap i **Idébehandlere**-gruppen.

  - type: checkboxes
    id: idebehandling
    attributes:
      label: Idébehandling
      description: >
        Test «Sett anbefaling»-kommandoen på Idébehandling-listen.
        Merk: «Opprett prosjektdata» er en separat kommando (se neste seksjon).
      options:
        - label: "«Sett anbefaling»-knapp vises ved markering av ett listeelement"
        - label: "Knappen er SKJULT for brukere som IKKE er i Idébehandlere-gruppen"
        - label: "Knappen er SKJULT når ingen elementer er markert"
        - label: "Dialog åpnes med handlingsvalg (Combobox) og kommentarfelt (Textarea)"
        - label: "Innsending er DEAKTIVERT til både valg og kommentar er fylt ut"
        - label: "Godkjenning: beslutning og kommentar lagres på behandlingselementet (GtIdeaDecision)"
        - label: "Avvisning: beslutning og kommentar lagres korrekt"
        - label: "Til vurdering: beslutning og kommentar lagres korrekt"
        - label: "Allerede godkjent idé viser varselmelding «Denne ideen er allerede godkjent»"

  # ─────────────────────────────────────────────
  # Idé — Opprett prosjektdata (ListViewCommandSet)
  # ─────────────────────────────────────────────
  - type: markdown
    attributes:
      value: |
        ---
        ## 📊 Idé — Opprett prosjektdata

        Kommando på **Idébehandling**-listen.
        Krever medlemskap i **Idébehandlere**-gruppen.

  - type: checkboxes
    id: ide-prosjektdata
    attributes:
      label: Opprett prosjektdata
      description: >
        Test «Opprett prosjektdata»-kommandoen på Idébehandling-listen.
        Oppretter et element i Prosjektdata-listen og lenker det til behandlingselementet.
      options:
        - label: "«Opprett prosjektdata»-knapp vises ved markering av ett listeelement"
        - label: "Knappen er SKJULT for brukere som IKKE er i Idébehandlere-gruppen"
        - label: "Knappen er SKJULT når ingen elementer er markert"
        - label: "Dialog viser informasjonsmelding for godkjent idé"
        - label: "Dialog viser advarsel «Denne ideen er ikke godkjent» og Opprett-knapp er DEAKTIVERT for ikke-godkjente idéer"
        - label: "Dialog viser advarsel «Det er allerede opprettet prosjektdata» og Opprett-knapp er DEAKTIVERT når prosjektdata allerede eksisterer"
        - label: "Opprett: nytt element opprettes i Prosjektdata-listen med tittel og finansnavn"
        - label: "Opprett: behandlingselementet oppdateres med GtIdeaProjectDataId"
        - label: "Etter opprettelse: bruker sendes til redigeringsskjema for prosjektdata-elementet"

  # ─────────────────────────────────────────────
  # Kommentarer
  # ─────────────────────────────────────────────
  - type: textarea
    id: kommentarer
    attributes:
      label: Kommentarer
      description: Eventuelle feil, observasjoner eller avvik som ble funnet under testing
      placeholder: Beskriv eventuelle problemer her...

  - type: markdown
    attributes:
      value: |
        ---
        ## 📄 Idé KUR-sider

  - type: checkboxes
    id: idé-kur
    attributes:
      label: Idé KUR-sider
      description: Test KUR-sider opprettet fra idéregistrering
      options:
        - label: "KUR-siden inneholder informasjonen fra idéregistreringen"
        - label: "KUR-siden er tilgjengelig via lenke fra idébehandling-elementet"

  - type: markdown
    attributes:
      value: |
        ---
        ## 🔗 Prosjektdata → Prosjektoppsett

  - type: checkboxes
    id: prosjektdata-oppsett
    attributes:
      label: Prosjektdata → Prosjektoppsett
      description: Test at prosjektdata fra idé flyter til prosjektoppsett
      options:
        - label: "Fyll ut metadata og angi områdeadresse til reelt prosjekt på prosjektdata-elementet"
        - label: "Informasjon om prosjektdata funnet dukker opp i prosjektoppsett-dialog"
        - label: "Prosjektdata følger med inn i prosjektinformasjon etter opprettelse av prosjekt"

  - type: textarea
    id: kommentarer
    attributes:
      label: Kommentarer og feil
      description: Beskriv eventuelle feil eller avvik du finner. Legg ved skjermbilder.
    validations:
      required: false
